version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      playwright:
        patterns:
          - "playwright"
          - "@playwright/test"
          - "eslint-plugin-playwright"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      testing-library:
        patterns:
          - "@testing-library/*"
      react:
        patterns:
          - "react"
          - "react-dom"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "typescript-eslint"
    ignore:
      # ESLint 10.0.x breaks eslint-plugin-react (used by eslint-config-next).
      # Remove when eslint-config-next supports ESLint 10.
      - dependency-name: "eslint"
        versions: [">=10.0.0", "<10.1.0"]
